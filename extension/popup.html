<!DOCTYPE html>
<html>
<head>
    <meta charset = "utf-8">
    <style>
        body {
            width: 280px;
            font-family: sans-serif;
            padding: 12px;
            margin: 0;
            background-color: #f9fafb;
        }
        h3 {
            margin-top: 0;
            color: #111827;
            font-size: 14px;
            font-weight: 600;
        }
        textarea {
            width: 100%;
            height: 60px;
            box-sizing: border-box;
            margin-bottom: 10px;
            padding: 6px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            resize: none;
            font-size: 12px;
        }
        textarea:focus {
            outline:none;
            border-color: #3b82f6;
        }
        button {
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
            font-size: 12px;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        #status{
            margin-top: 8px;
            font-size: 11px;
            color: #6b7280;
            text-align: center;
        }
    </style>
</head>
<body>
    <h3>OpenAtlas Collecter</h3>
    <textarea id= "notes" placeholder="Add optional thoughts, context, or notes here..."></textarea>
    <button id="save-btn">Save to OpenAtlas</button>
    <div id="status"></div>

    <script src="popup.js"></script>
</body>
</html>
